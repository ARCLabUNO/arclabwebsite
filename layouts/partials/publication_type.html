{{ $types := .Params.publication_types }}

{{ range $types }}
  {{ if eq . "1" }}<span class="pub-type">Uncategorized</span>{{ end }}
  {{ if eq . "2" }}<span class="pub-type">Journal Article</span>{{ end }}
  {{ if eq . "3" }}<span class="pub-type">Preprint</span>{{ end }}
  {{ if eq . "4" }}<span class="pub-type">Report</span>{{ end }}
  {{ if eq . "5" }}<span class="pub-type">Working Paper</span>{{ end }}
  {{ if eq . "6" }}<span class="pub-type">Book Chapter</span>{{ end }}
{{ end }}
