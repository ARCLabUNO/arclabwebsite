<style>
/* Hide featured image */
.article-header .article-header-caption,
.article-header img,
.featured-image {
  display: none !important;
}

/* Intro text */
.article-container > p:first-of-type {
  font-size: 1.1rem;
  color: #d1d5db;
  margin-bottom: 2rem;
  line-height: 1.6;
}

/* Section headings */
.article-container h2 {
  color: #f9fafb;
  font-size: 1.8rem;
  margin-top: 3rem;
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid #1f3a5f;
}

.article-container h3 {
  color: #e5e7eb;
  font-size: 1.3rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-weight: 600;
}

/* LIST → CARD GRID */
.article-container ul:not(.network-icon) {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

/* CARDS */
.article-container ul:not(.network-icon) li {
  background: #111827; /* same as resource cards */
  color: #f9fafb;
  border: 1px solid #1f2937;
  border-top: 4px solid #1f3a5f; /* navy accent */
  border-radius: 10px;
  padding: 1.5rem;
  transition: all 0.25s ease;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
}

.article-container ul:not(.network-icon) li:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.35);
}

/* LINKS */
.article-container ul:not(.network-icon) li a {
  color: #93c5fd; /* softer readable blue */
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
  display: block;
  margin-bottom: 0.5rem;
}

.article-container ul:not(.network-icon) li a:hover {
  color: #bfdbfe;
}

/* NESTED LISTS */
.article-container ul:not(.network-icon) ul {
  display: block;
  margin-top: 1rem;
  padding-left: 0;
}

.article-container ul:not(.network-icon) ul li {
  background: #1f2937;
  border: 1px solid #374151;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  box-shadow: none;
}

.article-container ul:not(.network-icon) ul li:hover {
  transform: translateY(-2px);
}

/* Fix spacing for top-level items */
.article-container ul:not(.network-icon) > li {
  min-height: 100px;
}

/* Contact email block */
.article-container > p:has(a[href*="mailto"]) {
  background: #1f2937;
  border-left: 4px solid #1f3a5f;
  padding: 1rem 1.5rem;
  border-radius: 6px;
  margin: 2rem 0;
  font-style: italic;
  color: #e5e7eb;
}

/* Responsive */
@media (max-width: 768px) {
  .article-container ul:not(.network-icon) {
    grid-template-columns: 1fr;
  }
}
</style>
