<style>
/* Hide featured image */
.article-header .article-header-caption,
.article-header img,
.featured-image {
  display: none !important;
}

/* Style the intro text */
.article-container > p:first-of-type {
  font-size: 1.1rem;
  color: #d1d5db;
  margin-bottom: 2rem;
  line-height: 1.6;
}

/* Style section headings */
.article-container h2 {
  color: #f9fafb;
  font-size: 1.8rem;
  margin-top: 3rem;
  margin-bottom: 1.5rem;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid #1f3a5f;
}

.article-container h3 {
  color: #e5e7eb;
  font-size: 1.3rem;
  margin-top: 2rem;
  margin-bottom: 1rem;
  font-weight: 600;
}

/* Style only article-content lists, not footer/share/social lists */
.article-container > ul,
.article-container > div > ul,
.article-container > section > ul {
  list-style: none;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

/* Cards */
.article-container > ul > li,
.article-container > div > ul > li,
.article-container > section > ul > li {
  background: #111827;
  color: #f9fafb;
  border: 1px solid #1f2937;
  border-top: 4px solid #1f3a5f;
  border-radius: 10px;
  padding: 1.5rem;
  transition: all 0.25s ease;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
  min-height: 100px;
}

.article-container > ul > li:hover,
.article-container > div > ul > li:hover,
.article-container > section > ul > li:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.35);
}

/* Links */
.article-container > ul > li a,
.article-container > div > ul > li a,
.article-container > section > ul > li a {
  color: #93c5fd;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
  display: block;
  margin-bottom: 0.5rem;
}

.article-container > ul > li a:hover,
.article-container > div > ul > li a:hover,
.article-container > section > ul > li a:hover {
  color: #bfdbfe;
}

/* Nested lists */
.article-container > ul > li ul,
.article-container > div > ul > li ul,
.article-container > section > ul > li ul {
  display: block;
  margin-top: 1rem;
  padding-left: 0;
  list-style: none;
}

.article-container > ul > li ul li,
.article-container > div > ul > li ul li,
.article-container > section > ul > li ul li {
  background: #1f2937;
  border: 1px solid #374151;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  box-shadow: none;
}

.article-container > ul > li ul li:hover,
.article-container > div > ul > li ul li:hover,
.article-container > section > ul > li ul li:hover {
  transform: translateY(-2px);
}

.article-container > ul > li ul li a,
.article-container > div > ul > li ul li a,
.article-container > section > ul > li ul li a {
  font-size: 1rem;
  font-weight: 500;
  margin-bottom: 0;
}

/* Contact email prompt */
.article-container > p:has(a[href*="mailto"]) {
  background: #1f2937;
  border-left: 4px solid #1f3a5f;
  padding: 1rem 1.5rem;
  border-radius: 6px;
  margin: 2rem 0;
  font-style: italic;
  color: #e5e7eb;
}

/* Responsive */
@media (max-width: 768px) {
  .article-container > ul,
  .article-container > div > ul,
  .article-container > section > ul {
    grid-template-columns: 1fr;
  }
}
</style>
